<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #f8fafc;
    }
    h3 {
      margin: 0;
      font-size: 16px;
      color: #0f172a;
    }
    p {
      margin: 0;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 12px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green { background: #22c55e; }
    .dot-red { background: #ef4444; }
    .dot-yellow { background: #eab308; }
    .muted {
      color: #64748b;
      font-size: 12px;
      line-height: 1.5;
    }
    .mode-switch {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .mode-btn,
    .btn {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all .15s ease;
      font-size: 13px;
      font-weight: 600;
    }
    .mode-btn {
      padding: 10px 6px;
      background: #eff6ff;
      color: #1d4ed8;
    }
    .mode-btn.active {
      background: #2563eb;
      color: #fff;
    }
    .btn {
      width: 100%;
      padding: 10px 12px;
      margin-top: 8px;
      background: #2563eb;
      color: #fff;
    }
    .btn.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
    .btn.danger {
      background: #ef4444;
      color: #fff;
    }
    .btn:disabled,
    .mode-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #e2e8f0;
      color: #334155;
    }
    .hint {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 10px 12px;
      color: #1e3a8a;
      font-size: 12px;
      line-height: 1.5;
    }
    .error {
      margin-top: 10px;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      border-radius: 10px;
      padding: 10px 12px;
      color: #be123c;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <h3>JobsIn 助手</h3>
      <span id="modeBadge" class="badge">AUTO</span>
    </div>

    <div class="status-row">
      <div id="statusDot" class="status-dot dot-red"></div>
      <span id="statusText">后端检查中...</span>
    </div>

    <div class="status-row" id="pollRow">
      <div id="pollDot" class="status-dot dot-yellow"></div>
      <span id="pollText">命令通道检查中...</span>
    </div>

    <div class="mode-switch">
      <button id="modeAuto" class="mode-btn" data-mode="auto">自动</button>
      <button id="modeCompanion" class="mode-btn" data-mode="companion">陪伴</button>
      <button id="modeGreeting" class="mode-btn" data-mode="greeting">沟通</button>
    </div>

    <p id="modeDesc" class="muted" style="margin-top:10px;">正在加载模式说明...</p>

    <button id="toggleBtn" class="btn">开始轮询</button>
    <button id="showAssistantBtn" class="btn secondary">显示页面助手</button>
    <button id="resetAssistantBtn" class="btn secondary">重置悬浮球位置</button>

    <div id="popupError" class="error"></div>
  </div>

  <div class="hint">
    完整功能请在 Boss 页面中使用悬浮小球。这里主要用于查看状态、切换模式、恢复页面助手。
  </div>

  <script src="popup.js"></script>
</body>
</html>
